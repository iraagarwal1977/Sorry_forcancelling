<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yay</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #a1ffce, #faffd1);
    }

    .container {
        width: 90%;
        max-width: 380px;
        text-align: center;
        background: rgba(255,255,255,0.2);
        padding: 20px;
        border-radius: 20px;
        backdrop-filter: blur(12px);
        box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    }

    h1 {
        color: white;
        font-size: 2.5rem;
        margin-bottom: 20px;

        /* Black outline */
        -webkit-text-stroke: 2px black;

        /* Fallback outline using shadows */
        text-shadow:
            -1px -1px 0 black,
             1px -1px 0 black,
            -1px  1px 0 black,
             1px  1px 0 black;
    }

    img {
        width: 100%;
        max-height: 220px;
        object-fit: cover;
        border-radius: 12px;
    }
</style>
</head>

<body>

<div class="container">
    <h1>Yay</h1>
    <img src="cat.gif" alt="Cat">
</div>

</body>
</html>
