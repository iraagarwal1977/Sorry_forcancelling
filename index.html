<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan Confirmation</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #ff9a9e, #fad0c4);
        overflow: hidden;
    }

    .container {
        width: 90%;
        max-width: 380px;
        height: 80vh;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        background: rgba(255,255,255,0.2);
        padding: 20px;
        border-radius: 20px;
        backdrop-filter: blur(12px);
        box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        position: relative;
    }

    h1 {
        color: white;
        text-align: center;
        font-size: 1.5rem;
    }

    img {
        width: 100%;
        max-height: 180px;
        object-fit: cover;
        border-radius: 12px;
    }

    .btn {
        position: absolute;
        width: 90px;
        height: 45px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-size: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: 0.12s;
    }

    /* Centered alignment */
    #yesBtn {
        background: #4CAF50;
        color: white;
        bottom: 20px;
        left: 50%;
        transform: translateX(-120%);
    }

    #noBtn {
        background: #ff4d4d;
        color: white;
        bottom: 20px;
        left: 50%;
        transform: translateX(20%);
    }
</style>
</head>

<body>

<div class="container" id="container">
    <div>
        <h1>Will you buy me another pair of Jordans, please?</h1>
        <img src="hamster.png">
    </div>

    <button id="yesBtn" class="btn">Yes</button>
    <button id="noBtn" class="btn">No</button>
</div>

<script>
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const container = document.getElementById("container");

const SAFE_DISTANCE = 100;
const GAP = 50;

// prevent overlap with Yes
function isTooClose(a, b) {
    const r1 = a.getBoundingClientRect();
    const r2 = b.getBoundingClientRect();

    return !(
        r1.right + GAP < r2.left ||
        r1.left > r2.right + GAP ||
        r1.bottom + GAP < r2.top ||
        r1.top > r2.bottom + GAP
    );
}

// move inside container
function moveButton() {
    const maxX = container.clientWidth - noBtn.offsetWidth;
    const maxY = container.clientHeight - noBtn.offsetHeight;

    let x, y, tries = 0;

    do {
        x = Math.random() * maxX;
        y = Math.random() * maxY;

        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";

        tries++;
    } while (isTooClose(noBtn, yesBtn) && tries < 100);
}

// escape before touch
document.addEventListener("pointermove", (e) => {
    const rect = noBtn.getBoundingClientRect();
    const dx = e.clientX - (rect.left + rect.width / 2);
    const dy = e.clientY - (rect.top + rect.height / 2);

    const distance = Math.sqrt(dx * dx + dy * dy);

    if (distance < SAFE_DISTANCE) {
        moveButton();
    }
});

// emergency escape
noBtn.addEventListener("pointerdown", (e) => {
    e.preventDefault();
    moveButton();
});

// yes → next page
yesBtn.addEventListener("click", () => {
    window.location.href = "yay.html";
});
</script>

</body>
</html>
